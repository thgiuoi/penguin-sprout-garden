<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penguin sprout garden</title>

<style>
body{
  margin:0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(to bottom,#e6f4ff,#fff6e6);
  text-align:center;
  transition:0.4s;
}

.dark{
  background: linear-gradient(to bottom,#1e2a38,#3a2f2f);
  color:white;
}

header{
  padding:20px;
}

h1{
  margin:0;
  font-weight:600;
  color:#4a6fa5;
}

.total{
  margin-top:8px;
  font-size:16px;
  font-weight:600;
}

button{
  margin-top:10px;
  padding:6px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(70px,1fr));
  gap:18px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* Hoa 8 cánh */
.flower{
  width:70px;
  height:70px;
  position:relative;
  cursor:pointer;
  transition:0.3s;
}

.petals{
  position:absolute;
  width:100%;
  height:100%;
}

.petals div{
  position:absolute;
  width:40%;
  height:40%;
  border-radius:50%;
  top:30%;
  left:30%;
}

.center{
  position:absolute;
  width:35%;
  height:35%;
  border-radius:50%;
  top:32%;
  left:32%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  font-size:14px;
}

/* trạng thái */
.state0 .petals div{
  background:#cfe9ff;
}
.state0 .center{
  background:#a9d6ff;
}

.state1 .petals div{
  background:#d7b49e;
}
.state1 .center{
  background:#b08968;
  color:white;
}

.state2 .petals div{
  background:#ffe89a;
}
.state2 .center{
  background:#ffcc4d;
}

.flower:active{
  transform:scale(1.1);
}
</style>
</head>

<body>

<header>
  <h1>🐧 Penguin sprout garden </h1>
  <div>🌻 Mỗi ngày một chút dịu dàng, nắng vàng cả vườn hoa 🌻</div>
  <div class="total">Tổng tiền: <span id="total">0</span></div>
  <button onclick="toggleDark()">🌙 Dark mode</button>
</header>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");
const totalEl = document.getElementById("total");

let states = JSON.parse(localStorage.getItem("gardenStates")) 
             || Array(365).fill(0);

let values = JSON.parse(localStorage.getItem("gardenValues"))
             || Array(365).fill(null);

function createFlower(i){
  const flower = document.createElement("div");
  flower.classList.add("flower");

  const petals = document.createElement("div");
  petals.classList.add("petals");

  for(let j=0;j<8;j++){
    const p = document.createElement("div");
    const angle = j*45;
    p.style.transform = `rotate(${angle}deg) translate(0,-25px)`;
    petals.appendChild(p);
  }

  const center = document.createElement("div");
  center.classList.add("center");

  flower.appendChild(petals);
  flower.appendChild(center);

  updateFlower(flower,i);

  flower.addEventListener("click",()=>{
    states[i] = (states[i]+1)%3;

    if(states[i]===1){
      values[i] = Math.floor(Math.random()*30+1);
    }

    updateFlower(flower,i);
    saveData();
    updateTotal();
    checkComplete();
  });

  return flower;
}

function updateFlower(flower,i){
  flower.classList.remove("state0","state1","state2");
  flower.classList.add("state"+states[i]);

  const center = flower.querySelector(".center");

  if(states[i]===0){
    center.innerHTML="🐧";
  }
  if(states[i]===1){
    center.innerHTML=values[i];
  }
  if(states[i]===2){
    center.innerHTML="🌻";
  }
}

function saveData(){
  localStorage.setItem("gardenStates",JSON.stringify(states));
  localStorage.setItem("gardenValues",JSON.stringify(values));
}

function updateTotal(){
  let total = 0;
  values.forEach(v=>{
    if(v) total+=v;
  });
  totalEl.textContent = total;
}

function checkComplete(){
  if(states.every(s=>s===2)){
    setTimeout(()=>{
      alert("🎉 365 ngày hoàn thành! Vườn hoa đã nở rộ! 🌻");
    },200);
  }
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

for(let i=0;i<365;i++){
  grid.appendChild(createFlower(i));
}

updateTotal();
</script>

</body>
</html>
