<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vòng tròn 365 hoa hướng dương 🌻</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #fff3b0, #ffdab9);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.circle {
    position: relative;
    width: 550px;
    height: 550px;
}

.flower {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #444;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 10px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.showNumber {
    background: #ff6b6b;
}

.bloom {
    background: gold;
    box-shadow: 0 0 10px orange;
}
</style>
</head>

<body>

<div class="circle" id="circle"></div>

<script>
const circle = document.getElementById("circle");
const total = 365;
const radius = 240;

for (let i = 0; i < total; i++) {

    const angle = (i / total) * (2 * Math.PI);
    const x = 275 + radius * Math.cos(angle);
    const y = 275 + radius * Math.sin(angle);

    const flower = document.createElement("div");
    flower.classList.add("flower");
    flower.style.left = x + "px";
    flower.style.top = y + "px";

    let state = 0;

    flower.addEventListener("click", function() {

        if (state === 0) {
            flower.classList.add("showNumber");
            flower.textContent = "18";
            state = 1;

        } else if (state === 1) {
            flower.classList.remove("showNumber");
            flower.classList.add("bloom");
            flower.textContent = "";
            state = 2;
        }

    });

    circle.appendChild(flower);
}
</script>

</body>
</html>
