<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peguin sprout garden</title>

<style>
body{
  margin:0;
  font-family: "Segoe UI", sans-serif;
  background:#e6f4ff;
  text-align:center;
  transition:0.4s;
}

header{
  padding:20px;
}

h1{
  margin:0;
  font-weight:600;
  color:#6bb6ff;
}

.total{
  margin-top:8px;
  font-weight:600;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(70px,1fr));
  gap:18px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* Hoa chung */
.flower{
  width:70px;
  height:70px;
  position:relative;
  cursor:pointer;
  transition:0.3s;
}

.petals{
  position:absolute;
  width:100%;
  height:100%;
}

.petals div{
  position:absolute;
  width:40%;
  height:40%;
  border-radius:50%;
  top:30%;
  left:30%;
}

.center{
  position:absolute;
  width:35%;
  height:35%;
  border-radius:50%;
  top:32%;
  left:32%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  font-size:14px;
}

/* trạng thái */
.state0 .petals div{ background:#cfe9ff; }
.state0 .center{ background:#a9d6ff; }

.state1 .petals div{ background:#d7b49e; }
.state1 .center{ background:#b08968; color:white; }

.state2 .petals div{ background:#ffe89a; }
.state2 .center{ background:#ffcc4d; }

.flower:active{
  transform:scale(1.1);
}

/* hoa theme nhỏ */
.theme-container{
  margin-top:14px;
}

.theme-flower{
  width:40px;
  height:40px;
  display:inline-block;
  position:relative;
  margin:0 8px;
  cursor:pointer;
  transition:0.3s;
}

.theme-flower div{
  position:absolute;
  width:40%;
  height:40%;
  border-radius:50%;
  top:30%;
  left:30%;
}

.theme-flower:hover{
  transform:scale(1.2);
}
</style>
</head>

<body>

<header>
  <h1>🐧 Peguin sprout garden 🐧</h1>
  <div>🌻 Mỗi ngày một chút dịu dàng, nắng vàng cả vườn hoa 🌻</div>
  <div class="total">Tổng tiền: <span id="total">0</span></div>

  <div class="theme-container" id="themes"></div>
</header>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");
const totalEl = document.getElementById("total");
const themesDiv = document.getElementById("themes");

let states = JSON.parse(localStorage.getItem("gardenStates")) 
             || Array(365).fill(0);

let values = JSON.parse(localStorage.getItem("gardenValues"))
             || Array(365).fill(null);

let savedTheme = JSON.parse(localStorage.getItem("theme")) 
                || {bg:"#e6f4ff", accent:"#6bb6ff"};

applyTheme(savedTheme.bg, savedTheme.accent);

/* tạo hoa chính */
function createFlower(i){
  const flower = document.createElement("div");
  flower.classList.add("flower");

  const petals = document.createElement("div");
  petals.classList.add("petals");

  for(let j=0;j<8;j++){
    const p = document.createElement("div");
    const angle = j*45;
    p.style.transform = `rotate(${angle}deg) translate(0,-25px)`;
    petals.appendChild(p);
  }

  const center = document.createElement("div");
  center.classList.add("center");

  flower.appendChild(petals);
  flower.appendChild(center);

  updateFlower(flower,i);

  flower.addEventListener("click",()=>{
    states[i] = (states[i]+1)%3;
    if(states[i]===1){
      values[i] = Math.floor(Math.random()*30+1);
    }
    updateFlower(flower,i);
    saveData();
    updateTotal();
  });

  return flower;
}

function updateFlower(flower,i){
  flower.classList.remove("state0","state1","state2");
  flower.classList.add("state"+states[i]);
  const center = flower.querySelector(".center");

  if(states[i]===0) center.innerHTML="🐧";
  if(states[i]===1) center.innerHTML=values[i];
  if(states[i]===2) center.innerHTML="🌻";
}

function saveData(){
  localStorage.setItem("gardenStates",JSON.stringify(states));
  localStorage.setItem("gardenValues",JSON.stringify(values));
}

function updateTotal(){
  let total=0;
  values.forEach(v=>{ if(v) total+=v; });
  totalEl.textContent = total;
}

/* tạo theme hoa nhỏ */
const themeColors = [
  {bg:"#fff6d6", accent:"#ffda77"},
  {bg:"#eaffea", accent:"#7ed957"},
  {bg:"#e6f4ff", accent:"#6bb6ff"},
  {bg:"#fff0f7", accent:"#ff8ccf"},
  {bg:"#f3ecff", accent:"#b388ff"}
];

themeColors.forEach(t=>{
  const tf = document.createElement("div");
  tf.classList.add("theme-flower");

  for(let j=0;j<8;j++){
    const p = document.createElement("div");
    p.style.background=t.accent;
    p.style.transform=`rotate(${j*45}deg) translate(0,-15px)`;
    tf.appendChild(p);
  }

  tf.onclick=()=>{
    applyTheme(t.bg,t.accent);
    localStorage.setItem("theme",JSON.stringify(t));
  }

  themesDiv.appendChild(tf);
});

function applyTheme(bg,accent){
  document.body.style.background=bg;
  document.querySelector("h1").style.color=accent;
}

for(let i=0;i<365;i++){
  grid.appendChild(createFlower(i));
}

updateTotal();
</script>

</body>
</html>
