<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>365 Hoa Hướng Dương của Na 🌻</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #fff6c9, #ffd6a5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.circle {
    position: relative;
    width: 650px;
    height: 650px;
}

.flower {
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #444;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 9px;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
}

.flower:hover {
    transform: scale(1.3);
}

/* Khi hiện số */
.showNumber {
    background: #ff6b6b;
}

/* Khi nở hoa */
.bloom {
    background: gold;
    box-shadow: 0 0 8px orange;
    transform: scale(1.4);
}
</style>
</head>

<body>

<div class="circle" id="circle"></div>

<script>
const circle = document.getElementById("circle");
const totalFlowers = 365;
const radius = 280;
const center = 325;

for (let i = 0; i < totalFlowers; i++) {

    const angle = (i / totalFlowers) * (2 * Math.PI);

    const x = center + radius * Math.cos(angle);
    const y = center + radius * Math.sin(angle);

    const flower = document.createElement("div");
    flower.classList.add("flower");
    flower.style.left = x + "px";
    flower.style.top = y + "px";

    let state = 0;

    flower.addEventListener("click", function() {

        if (state === 0) {
            flower.classList.add("showNumber");
            flower.textContent = "18";
            state = 1;

        } else if (state === 1) {
            flower.classList.remove("showNumber");
            flower.classList.add("bloom");
            flower.textContent = "";
            state = 2;
        }

    });

    circle.appendChild(flower);
}
</script>

</body>
</html>
