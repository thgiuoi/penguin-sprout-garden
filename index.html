<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>365 Ngày Mộng Mơ 🌻</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Quicksand',sans-serif;
    background:linear-gradient(180deg,#f8f9ff,#ffeef5);
}

/* HEADER */
.header{
    text-align:center;
    padding:40px 20px 10px 20px;
}

.mascot{
    font-size:70px;
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

.title{
    font-size:28px;
    color:#5e548e;
    margin:10px 0 5px 0;
}

.slogan{
    font-size:16px;
    color:#8d99ae;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,80px);
    gap:20px;
    justify-content:center;
    padding:40px;
}

/* FLOWER BASE */
.flower{
    width:80px;
    height:80px;
    position:relative;
    cursor:pointer;
    transition:0.4s ease;
}

/* Cánh hoa mềm */
.flower::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:#bde0fe; /* xanh dương pastel */
    border-radius:50%;
    box-shadow:
        0 -25px #bde0fe,
        0 25px #bde0fe,
        25px 0 #bde0fe,
        -25px 0 #bde0fe;
    transition:0.4s ease;
}

/* Tâm hoa / nội dung */
.flower::after{
    content:"🐧";
    position:absolute;
    width:40px;
    height:40px;
    background:#a2d2ff;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    transition:0.4s ease;
}

/* Hover */
.flower:hover{
    transform:scale(1.08);
}

/* Lần 1 – hiện tiền */
.showMoney::before{
    background:#caffbf;
    box-shadow:
        0 -25px #caffbf,
        0 25px #caffbf,
        25px 0 #caffbf,
        -25px 0 #caffbf;
}

.showMoney::after{
    content:attr(data-number);
    background:#95d5b2;
    color:white;
    font-weight:600;
}

/* Lần 2 – nở hoa hướng dương */
.bloom::before{
    background:#ffe066;
    box-shadow:
        0 -25px #ffe066,
        0 25px #ffe066,
        25px 0 #ffe066,
        -25px 0 #ffe066;
}

.bloom::after{
    content:"";
    background:#ffb703;
}
</style>
</head>

<body>

<div class="header">
    <div class="mascot">🐧</div>
    <div class="title">365 Ngày Nở Hoa</div>
    <div class="slogan">Mỗi ngày một chút dịu dàng, cả năm thành vườn mơ 🌻</div>
</div>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");

for(let i=0;i<365;i++){

    const flower=document.createElement("div");
    flower.className="flower";

    let state=0;
    let randomNumber=Math.floor(Math.random()*30)+1;
    flower.setAttribute("data-number",randomNumber);

    flower.onclick=function(){

        if(state===0){
            flower.classList.add("showMoney");
            state=1;
        }
        else if(state===1){
            flower.classList.remove("showMoney");
            flower.classList.add("bloom");
            state=2;
        }
    }

    grid.appendChild(flower);
}
</script>

</body>
</html>
