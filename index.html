<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>365 Hoa của Na 🌻</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#fff8f0;
    font-family:Arial, sans-serif;
}

/* Lưới 365 ô */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, 60px);
    gap:12px;
    justify-content:center;
}

/* Hoa */
.flower{
    width:60px;
    height:60px;
    background:#b7e4c7; /* xanh pastel */
    clip-path: polygon(
        50% 0%, 61% 20%, 82% 18%, 70% 35%,
        88% 50%, 70% 65%, 82% 82%, 61% 80%,
        50% 100%, 39% 80%, 18% 82%, 30% 65%,
        12% 50%, 30% 35%, 18% 18%, 39% 20%
    );
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:16px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.flower:hover{
    transform:scale(1.1);
}

/* Khi hiện số */
.showNumber{
    background:#a0c4ff; /* xanh dương pastel */
}

/* Khi nở */
.bloom{
    background:#ffd166; /* vàng pastel */
}
</style>
</head>

<body>

<h2 style="text-align:center;color:#444;">🌻 365 Hoa Năm Của Na 🌻</h2>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");

for(let i=0;i<365;i++){

    const flower = document.createElement("div");
    flower.className="flower";

    let state=0;
    let randomNumber = Math.floor(Math.random()*30)+1;

    flower.onclick=function(){

        if(state===0){
            flower.classList.add("showNumber");
            flower.textContent=randomNumber;
            state=1;
        }
        else if(state===1){
            flower.classList.remove("showNumber");
            flower.classList.add("bloom");
            flower.textContent="";
            state=2;
        }
    }

    grid.appendChild(flower);
}
</script>

</body>
</html>
